<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TDT Portal - Operator</title>
  <style>
    body{font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;background:#f0f2f5;color:#2d3436;margin:0;padding:0}
    .top-bar{background:#1a252f;padding:15px 30px;display:flex;justify-content:space-between;align-items:center;color:white;position:sticky;top:0;z-index:100}
    .nav-tabs button{background:none;border:none;color:white;font-size:16px;margin-right:20px;cursor:pointer;opacity:0.7;font-weight:bold}
    .nav-tabs button.active{opacity:1;border-bottom:3px solid #f1c40f;padding-bottom:5px}
    .btn-logout{background:#e74c3c;color:white;border:none;padding:8px 18px;border-radius:5px;cursor:pointer;font-weight:bold}
    .dashboard-container{max-width:1100px;margin:30px auto;padding:0 20px}
    .header{background:#2c3e50;color:white;padding:20px;text-align:center;border-radius:10px;margin-bottom:25px}
    .stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:20px;margin-bottom:30px}
    .stat-card{background:white;padding:25px;border-radius:15px;text-align:center;box-shadow:0 4px 15px rgba(0,0,0,0.05)}
    .stat-card h3{margin:0;color:#7f8c8d;font-size:14px;text-transform:uppercase}
    .stat-card .num{font-size:35px;font-weight:bold;margin-top:10px;color:#2c3e50}
    .card-total{border-top:6px solid #3498db} .card-pending{border-top:6px solid #f1c40f} .card-approved{border-top:6px solid #2ecc71}
    .search-section{background:white;padding:30px;border-radius:15px;box-shadow:0 4px 15px rgba(0,0,0,0.05);text-align:center;margin-bottom:30px}
    .search-box{width:60%;padding:15px;border:2px solid #ddd;border-radius:30px;font-size:18px;outline:none}
    .search-btn{padding:15px 35px;background:#2ecc71;color:white;border:none;border-radius:30px;font-weight:bold;cursor:pointer;margin-left:-60px}
    .report-view{background:#fff;padding:30px;border-radius:15px;border:2px solid #2ecc71;text-align:left;max-width:700px;margin:20px auto 0}
    .summary-card{background:white;border-radius:12px;overflow:hidden;box-shadow:0 4px 15px rgba(0,0,0,0.05);border:1px solid #ddd}
    .summary-header{background:#34495e;color:white;padding:15px 20px;font-weight:bold;font-size:16px}
    .sum-table{width:100%;border-collapse:collapse} .sum-table th{background:#34495e;color:white;padding:12px 15px;text-align:left;font-size:14px}
    .sum-table td{padding:12px 15px;border-bottom:1px solid #eee;font-size:14px}
    .badge{padding:4px 12px;border-radius:20px;font-size:12px;font-weight:bold;color:white}
    .bg-approved{background:#2ecc71} .bg-pending{background:#f1c40f} .bg-rejected{background:#e74c3c}
    .btn-view{background:#007bff;color:white;padding:5px 12px;border-radius:5px;text-decoration:none;font-size:12px;font-weight:bold}
    
    /* User Mgt UI */
    .user-box{background:white;padding:30px;border-radius:10px;border:2px solid #0984e3;margin-bottom:20px}
  </style>
</head>
<body style="display:none;" id="main-body">

  <div class="top-bar">
    <div class="nav-tabs">
      <button class="active" onclick="switchTab('view-dash', this); loadDashboardData();">Global Overview</button>
      <button onclick="switchTab('view-admin-users', this); loadUserList();">Manage Users</button>
    </div>
    <div><span id="welcomeMsg" style="margin-right:20px; font-weight:bold;"></span><button class="btn-logout" onclick="logout()">Logout</button></div>
  </div>

  <div id="view-dash" class="dashboard-container">
    <div class="header"><h1>🛠️ OPERATOR DASHBOARD</h1><p>System Management</p></div>
    <div class="stats-row">
      <div class="stat-card card-total"><h3>Total Valuations</h3><div class="num" id="tAll">0</div></div>
      <div class="stat-card card-pending"><h3>Pending Approvals</h3><div class="num" id="tPend">0</div></div>
      <div class="stat-card card-approved"><h3>Approved Reports</h3><div class="num" id="tAppr">0</div></div>
    </div>
    <div class="search-section">
      <h2>🔍 Search Global History</h2>
      <input type="text" id="vNo" class="search-box" placeholder="Enter Vehicle Number..."><button class="search-btn" onclick="findVeh()">Search</button>
      <div id="searchResult"></div>
    </div>
    <div class="summary-card">
      <div class="summary-header">Global Recent Activity</div>
      <table class="sum-table">
        <thead><tr><th>Date</th><th>Vehicle No</th><th>Make & Model</th><th>Market Value</th><th>Sale Value</th><th>Status</th><th>Action</th></tr></thead>
        <tbody id="summaryTableBody"><tr><td colspan="7" style="text-align:center;">Loading...</td></tr></tbody>
      </table>
    </div>
  </div>

  <div id="view-admin-users" class="dashboard-container" style="display:none;">
    <h2>User Management</h2>
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:20px;">
      <div class="user-box">
        <h3 style="color:#0984e3; margin-top:0;">➕ Create New User</h3>
        <input type="text" id="newUname" placeholder="Username" style="margin-bottom:10px; width:100%; padding:10px; box-sizing:border-box;">
        <input type="email" id="newEmail" placeholder="Email" style="margin-bottom:10px; width:100%; padding:10px; box-sizing:border-box;">
        <button onclick="createUser()" style="background:#007bff; color:white; padding:12px; width:100%; border:none; border-radius:5px; font-weight:bold; cursor:pointer;">Create & Send Email</button>
        <div id="createStatus" style="margin-top:10px; font-weight:bold;"></div>
      </div>
      <div class="user-box" style="border-color:#e74c3c;">
        <h3 style="color:#e74c3c; margin-top:0;">🔄 Reset Password</h3>
        <select id="resetUserSelect" style="width:100%; padding:10px; margin-bottom:10px;"><option>Loading...</option></select>
        <button onclick="resetUserPass()" style="background:#dc3545; color:white; padding:12px; width:100%; border:none; border-radius:5px; font-weight:bold; cursor:pointer;">Reset Password</button>
        <div id="resetStatus" style="margin-top:10px; font-weight:bold;"></div>
      </div>
    </div>
  </div>

<script>
  const API_URL = "https://script.google.com/macros/s/AKfycbw7ioFVJRDgRcojAi_BkwK1w-rY_yck-cbwd9umvIhGJQhd4aO5KCzdHB1xOAYq7kR4/exec"; 
  let currentUser = null;

  window.onload = function() {
    const saved = localStorage.getItem('tdt_user');
    if (!saved) { window.location.href = 'index.html'; return; }
    currentUser = JSON.parse(saved);
    if (currentUser.role !== 'Operator') { window.location.href = 'index.html'; return; } // Role Protection
    
    document.getElementById('main-body').style.display = 'block';
    document.getElementById('welcomeMsg').innerText = `🛠️ ${currentUser.username} (Operator)`;
    loadDashboardData();
  };

  function logout() { localStorage.removeItem('tdt_user'); window.location.href = 'index.html'; }
  function switchTab(viewId, btnEl) {
    document.querySelectorAll('.dashboard-container').forEach(el => el.style.display = 'none');
    document.getElementById(viewId).style.display = 'block';
    if(btnEl) { document.querySelectorAll('.nav-tabs button').forEach(b => b.classList.remove('active')); btnEl.classList.add('active'); }
  }

  function loadDashboardData() {
    fetch(`${API_URL}?action=getDashboardStats&role=${currentUser.role}&email=${currentUser.email}`)
      .then(r => r.json()).then(res => { document.getElementById('tAll').innerText = res.data.total; document.getElementById('tPend').innerText = res.data.pending; document.getElementById('tAppr').innerText = res.data.approved; });
    fetch(`${API_URL}?action=getRecentSummaryTable&role=${currentUser.role}&email=${currentUser.email}`)
      .then(r => r.json()).then(res => {
        let tbody = document.getElementById('summaryTableBody');
        if(!res.data || !res.data.length) { tbody.innerHTML = "<tr><td colspan='7' style='text-align:center;'>No data found</td></tr>"; return; }
        tbody.innerHTML = res.data.map(r => `<tr><td>${r.date}</td><td><strong>${r.vehNo}</strong></td><td>${r.makeModel}</td><td>${r.marketVal ? Number(r.marketVal).toLocaleString() : '-'}</td><td>${r.saleVal ? Number(r.saleVal).toLocaleString() : '-'}</td><td><span class="badge ${r.status === 'Approved' ? 'bg-approved' : 'bg-pending'}">${r.status}</span></td><td>${(r.pdf && r.pdf !== "No Image") ? `<a href="${r.pdf}" target="_blank" class="btn-view">PDF</a>` : '-'}</td></tr>`).join('');
      });
  }

  function findVeh() {
    let val = document.getElementById('vNo').value; if(!val) return;
    document.getElementById('searchResult').innerHTML = "Searching...";
    fetch(`${API_URL}?action=searchVehicleReport&vNo=${val}&role=${currentUser.role}&email=${currentUser.email}`)
      .then(r => r.json()).then(res => {
        let div = document.getElementById('searchResult');
        if(!res.data.found) { div.innerHTML = "❌ No records found!"; return; }
        let pdfLink = (res.data.pdf && res.data.pdf !== "") ? `<a href="${res.data.pdf}" target="_blank" style="padding:10px 20px; background:#3498db; color:white; text-decoration:none; border-radius:5px;">Download Full PDF Report</a>` : '<span style="color:red">PDF Not Available Yet</span>';
        div.innerHTML = `<div class="report-view"><h2 style="text-align:center; color:#2ecc71;">VALUATION SUMMARY</h2><hr><p>Vehicle: <strong>${res.data.vehNo}</strong></p><p>Model: <strong>${res.data.make} ${res.data.model}</strong></p><p style="font-size:22px; color:#27ae60;">Market Value: <strong>LKR ${res.data.marketVal ? Number(res.data.marketVal).toLocaleString() : 'Pending'}</strong></p><p>Status: <strong>${res.data.status}</strong></p><div style="text-align:center; margin-top:20px;">${pdfLink}</div></div>`;
      });
  }

  function loadUserList() {
    fetch(API_URL + "?action=getUsernames").then(r=>r.json()).then(res => {
      document.getElementById('resetUserSelect').innerHTML = `<option value="">-- Select User --</option>` + res.data.map(u => `<option value="${u}">${u}</option>`).join('');
    });
  }
  async function createUser() {
    let u = document.getElementById('newUname').value; let e = document.getElementById('newEmail').value; if(!u || !e) return alert("Fill data");
    document.getElementById('createStatus').innerHTML = "Creating...";
    const res = await fetch(API_URL, { method: "POST", headers: {"Content-Type":"text/plain"}, body: JSON.stringify({action:"createUser", data:{username:u, email:e}}) });
    const json = await res.json(); document.getElementById('createStatus').innerText = json.result; document.getElementById('createStatus').style.color = json.success ? "green" : "red";
  }
  async function resetUserPass() {
    let u = document.getElementById('resetUserSelect').value; if(!u) return;
    document.getElementById('resetStatus').innerHTML = "Resetting...";
    const res = await fetch(API_URL, { method: "POST", headers: {"Content-Type":"text/plain"}, body: JSON.stringify({action:"resetPassword", data:{username:u}}) });
    const json = await res.json(); document.getElementById('resetStatus').innerText = json.result; document.getElementById('resetStatus').style.color = json.success ? "green" : "red";
  }
</script>
</body>
</html>
