<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TDT Portal</title>
  <style>
    /* Global & Login */
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f9; color: #2d3436; margin: 0; padding: 0; }
    #login-section { display: flex; justify-content: center; align-items: center; height: 100vh; background: linear-gradient(135deg, #0984e3, #2d3436); }
    .login-box { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); width: 100%; max-width: 350px; text-align: center; }
    .login-box input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
    .login-box button { width: 100%; padding: 12px; background: #0984e3; color: white; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }

    /* Navigation */
    .top-bar { background: #2c3e50; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; color: white; position: sticky; top: 0; z-index: 100;}
    .nav-tabs button { background: none; border: none; color: white; font-size: 16px; margin-right: 20px; cursor: pointer; opacity: 0.7; font-weight: bold; }
    .nav-tabs button.active { opacity: 1; border-bottom: 3px solid #0984e3; padding-bottom: 5px; }
    .btn-logout { background: #e74c3c; color: white; border: none; padding: 8px 18px; border-radius: 5px; cursor: pointer; font-weight: bold; }

    /* User Dashboard */
    .dashboard-container { max-width: 1000px; margin: 30px auto; padding: 0 20px; }
    .req-card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; border-left: 5px solid #0984e3; }
    .req-card.Approved { border-left-color: #27ae60; }
    .btn-new-req { background: #27ae60; color: white; padding: 12px 25px; border: none; border-radius: 5px; font-weight: bold; font-size: 16px; cursor: pointer; float: right; margin-bottom: 20px;}

    /* Form Styles (Hidden by default) */
    .form-container { background: white; padding: 30px; border-radius: 12px; max-width: 850px; margin: auto; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
    .section { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
    .full-width { grid-column: span 2; }
    input, select, textarea { width: 100%; padding: 10px; border: 1px solid #ced4da; border-radius: 5px; box-sizing: border-box; }
    
    /* User Management UI */
    .user-mgt-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; margin-top: 20px; }
    .user-box { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
    .box-create { border: 2px solid #0984e3; }
    .box-reset { border: 2px solid #e74c3c; }
    .user-box h3 { margin-top: 0; display: flex; align-items: center; gap: 10px; }
    .box-create h3 { color: #0984e3; }
    .box-reset h3 { color: #e74c3c; }
    .btn-create { background: #007bff; color: white; padding: 12px; width: 100%; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; margin-top: 15px;}
    .btn-reset { background: #dc3545; color: white; padding: 12px; width: 100%; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; margin-top: 15px;}
  </style>
</head>
<body>

  <!-- 1. LOGIN SECTION -->
  <div id="login-section">
    <div class="login-box">
      <h2 style="color:#2c3e50">🔐 TDT Portal Login</h2>
      <input type="text" id="uname" placeholder="Username" required>
      <input type="password" id="pwd" placeholder="Password" required>
      <button onclick="doLogin()" id="loginBtn">Login</button>
      <div id="loginError" style="color:red; margin-top:10px; font-weight:bold; display:none;">Invalid Credentials!</div>
    </div>
  </div>

  <!-- 2. MAIN APP CONTAINER (Hidden initially) -->
  <div id="app-section" style="display:none;">
    
    <div class="top-bar">
      <div class="nav-tabs" id="nav-tabs">
        <!-- JS will populate tabs based on role -->
      </div>
      <div>
        <span id="welcomeMsg" style="margin-right:20px; font-weight:bold;"></span>
        <button class="btn-logout" onclick="location.reload()">Logout</button>
      </div>
    </div>

    <!-- VIEW: USER DASHBOARD -->
    <div id="view-user-dash" class="dashboard-container" style="display:none;">
      <button class="btn-new-req" onclick="showForm()">➕ Create New Request</button>
      <h2>My Requests</h2>
      <div id="my-req-list">Loading...</div>
    </div>

    <!-- VIEW: VALUATION FORM -->
    <div id="view-form" class="dashboard-container" style="display:none;">
      <button onclick="showUserDash()" style="margin-bottom:15px; cursor:pointer;">🔙 Back to Dashboard</button>
      <div class="form-container">
        <h2 style="text-align:center; border-bottom: 3px solid #28a745; padding-bottom: 10px;">New Valuation Request</h2>
        <form id="vForm">
          <div class="section">
            <div class="full-width"><label>Vehicle Number</label><input type="text" name="vehicleNo" required></div>
            <div><label>Vehicle Type</label><input type="text" name="vType" required></div>
            <div><label>Make</label><input type="text" name="make" required></div>
            <div><label>Model</label><input type="text" name="model" required></div>
            <div><label>YOM</label><input type="number" name="yom" required></div>
            <div><label>Req. Amount</label><input type="number" name="reqAmount" required></div>
          </div>
          <!-- (අනෙක් Form Fields සහ Photo Inputs ටික ඔයාගේ පරණ එකෙන් මෙතනට Copy කරන්න) -->
          <button type="submit" id="submitBtn" style="width:100%; padding:15px; background:#28a745; color:white; border:none; border-radius:5px; font-weight:bold;">Submit Request</button>
        </form>
        <div id="status" style="text-align:center; margin-top:15px; font-weight:bold;"></div>
      </div>
    </div>

    <!-- VIEW: ADMIN REQUESTS -->
    <div id="view-admin-req" class="dashboard-container" style="display:none;">
      <h2>Pending Approvals</h2>
      <div id="admin-req-list">Loading...</div>
    </div>

    <!-- VIEW: ADMIN USER MANAGEMENT -->
    <div id="view-admin-users" class="dashboard-container" style="display:none;">
      <h2>User Management</h2>
      <div class="user-mgt-grid">
        
        <!-- Create User Box -->
        <div class="user-box box-create">
          <h3>➕ Create New User</h3>
          <label>Branch Name</label>
          <input type="text" id="newBranch" placeholder="e.g. Matara">
          <br><br>
          <label>Username (Login Name)</label>
          <input type="text" id="newUname" placeholder="JohnDoe">
          <br><br>
          <label>Email Address</label>
          <input type="email" id="newEmail" placeholder="john@tdt.lk">
          
          <button class="btn-create" onclick="createUser()" id="btnCreate">Create & Send Email</button>
          <div id="createStatus" style="margin-top:10px; font-weight:bold;"></div>
        </div>

        <!-- Reset Password Box -->
        <div class="user-box box-reset">
          <h3>🔄 Reset User Password</h3>
          <p style="font-size:13px; color:#555;">Select a user to generate and email a new temporary password.</p>
          <label>Search or Select Username...</label>
          <select id="resetUserSelect" style="padding:12px; font-size:16px;">
            <option value="">Loading Users...</option>
          </select>
          
          <button class="btn-reset" onclick="resetUserPass()" id="btnReset">Reset Password</button>
          <div id="resetStatus" style="margin-top:10px; font-weight:bold;"></div>
        </div>

      </div>
    </div>

  </div>

<script>
  // ==========================================
  const API_URL = "https://script.google.com/macros/s/AKfycbw9v-1VmS2-RCwtNX-4ghUoEVURlyuXom4E6gg5_BXFUMGWYES31Y0edmpZAOtKn0MM/exec"; 
  // ==========================================

  let currentUser = { username: "", role: "", email: "" };

  // --- 1. LOGIN & ROUTING ---
  async function doLogin() {
    const u = document.getElementById('uname').value;
    const p = document.getElementById('pwd').value;
    const btn = document.getElementById('loginBtn');
    if(!u || !p) return;
    
    btn.innerText = "Checking..."; btn.disabled = true;
    try {
      const res = await fetch(API_URL + `?action=checkLogin&username=${u}&password=${p}`);
      const json = await res.json();
      
      if (json.success && json.data.valid) {
        currentUser = json.data;
        document.getElementById('welcomeMsg').innerText = `👤 ${currentUser.username} (${currentUser.role})`;
        document.getElementById('login-section').style.display = 'none';
        document.getElementById('app-section').style.display = 'block';
        
        setupNavigation();
      } else {
        document.getElementById('loginError').style.display = "block";
        btn.innerText = "Login"; btn.disabled = false;
      }
    } catch (e) { alert("Network Error"); btn.innerText = "Login"; btn.disabled = false; }
  }

  function setupNavigation() {
    const tabs = document.getElementById('nav-tabs');
    if(currentUser.role === 'Admin') {
      tabs.innerHTML = `
        <button class="active" onclick="switchTab('view-admin-req', this)">Pending Requests</button>
        <button onclick="switchTab('view-admin-users', this); loadUserList();">Manage Users</button>
      `;
      switchTab('view-admin-req', tabs.children[0]);
      loadAdminRequests();
    } else {
      tabs.innerHTML = `<button class="active" onclick="switchTab('view-user-dash', this)">My Dashboard</button>`;
      switchTab('view-user-dash', tabs.children[0]);
      showUserDash();
    }
  }

  function switchTab(viewId, btnEl) {
    document.querySelectorAll('.dashboard-container').forEach(el => el.style.display = 'none');
    document.getElementById(viewId).style.display = 'block';
    
    if(btnEl) {
      document.querySelectorAll('.nav-tabs button').forEach(b => b.classList.remove('active'));
      btnEl.classList.add('active');
    }
  }

  // --- 2. USER VIEWS ---
  function showUserDash() {
    switchTab('view-user-dash');
    fetch(API_URL + `?action=getUserRequests&email=${currentUser.email}`)
      .then(r => r.json())
      .then(res => {
        const list = document.getElementById('my-req-list');
        if(!res.data || res.data.length === 0) list.innerHTML = "<p>No requests found.</p>";
        else {
          list.innerHTML = res.data.map(req => `
            <div class="req-card ${req.status}">
              <div>
                <h3 style="margin:0; color:#2c3e50;">${req.vehNo} <span style="font-size:12px; color:gray;">(${req.refNo})</span></h3>
                <p style="margin:5px 0 0 0; font-size:14px;">${req.make} ${req.model} - Rs. ${req.reqAmt}</p>
                <small style="color:#7f8c8d;">Requested on: ${req.date}</small>
              </div>
              <div style="font-weight:bold; padding:8px 15px; border-radius:20px; background:#f1f2f6; color:${req.status=='Approved'?'green':(req.status=='Rejected'?'red':'orange')}">${req.status}</div>
            </div>
          `).join('');
        }
      });
  }
  function showForm() { switchTab('view-form'); }

  // --- 3. ADMIN VIEWS ---
  function loadAdminRequests() {
    fetch(API_URL + "?action=getPendingRequests").then(r => r.json()).then(res => {
      document.getElementById('admin-req-list').innerHTML = res.data.length > 0 ? 
        res.data.map(r => `<div class="req-card"><h3>${r.vehNo}</h3> <button onclick="alert('Approve logic goes here!')">View</button></div>`).join('') 
        : "<p>No pending requests.</p>";
    });
  }

  function loadUserList() {
    fetch(API_URL + "?action=getUsernames").then(r=>r.json()).then(res => {
      document.getElementById('resetUserSelect').innerHTML = `<option value="">-- Select User --</option>` + 
        res.data.map(u => `<option value="${u}">${u}</option>`).join('');
    });
  }

  async function createUser() {
    const b = document.getElementById('newBranch').value;
    const u = document.getElementById('newUname').value;
    const e = document.getElementById('newEmail').value;
    const s = document.getElementById('createStatus');
    if(!u || !e) return alert("Username and Email required!");
    
    document.getElementById('btnCreate').innerText = "Creating..."; s.innerText = "";
    const res = await fetch(API_URL, { method: "POST", headers: {"Content-Type":"text/plain"}, body: JSON.stringify({action:"createUser", data:{branch:b, username:u, email:e}}) });
    const json = await res.json();
    s.innerText = json.result; s.style.color = json.success ? "green" : "red";
    document.getElementById('btnCreate').innerText = "Create & Send Email";
  }

  async function resetUserPass() {
    const u = document.getElementById('resetUserSelect').value;
    const s = document.getElementById('resetStatus');
    if(!u) return alert("Select a user!");
    
    document.getElementById('btnReset').innerText = "Resetting..."; s.innerText = "";
    const res = await fetch(API_URL, { method: "POST", headers: {"Content-Type":"text/plain"}, body: JSON.stringify({action:"resetPassword", data:{username:u}}) });
    const json = await res.json();
    s.innerText = json.result; s.style.color = json.success ? "green" : "red";
    document.getElementById('btnReset').innerText = "Reset Password";
  }

</script>
</body>
</html>
