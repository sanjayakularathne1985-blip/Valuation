<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TDT Portal - Login</title>
  <style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; margin: 0; padding: 0; }
    #login-section, #force-pwd-section { display: flex; justify-content: center; align-items: center; height: 100vh; background: linear-gradient(135deg, #2c3e50, #3498db); }
    .login-box { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); width: 100%; max-width: 350px; text-align: center; }
    .login-box input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
    .login-box button { width: 100%; padding: 12px; background: #3498db; color: white; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; margin-bottom:10px; }
  </style>
</head>
<body>

  <div id="login-section">
    <div class="login-box">
      <h2 style="color:#2c3e50">🔐 TDT Portal Login</h2>
      <input type="text" id="uname" placeholder="Username" required>
      <input type="password" id="pwd" placeholder="Password" required>
      <button onclick="doLogin()" id="loginBtn">Login</button>
      <div id="loginError" style="color:red; margin-top:10px; font-weight:bold; display:none;">Invalid Credentials!</div>
    </div>
  </div>

  <div id="force-pwd-section" style="display:none;">
    <div class="login-box" style="border-top: 5px solid #e67e22;">
      <h2 style="color:#e67e22; margin-top:0;">⚠️ Password Update Required</h2>
      <p style="font-size:14px; color:#555;">Please create a new secure password.</p>
      <input type="password" id="newPwd1" placeholder="Enter New Password" required>
      <input type="password" id="newPwd2" placeholder="Confirm New Password" required>
      <button onclick="saveNewPassword()" id="updatePwdBtn" style="background:#e67e22;">Update & Continue</button>
      <button onclick="logout()" style="background:#bdc3c7; color:#333;">Cancel</button>
      <div id="pwdUpdateError" style="color:red; margin-top:10px; font-weight:bold; display:none;"></div>
    </div>
  </div>

<script>
  // ==========================================
  const API_URL = "https://script.google.com/macros/s/AKfycbw7ioFVJRDgRcojAi_BkwK1w-rY_yck-cbwd9umvIhGJQhd4aO5KCzdHB1xOAYq7kR4/exec"; 
  // ==========================================
  let currentUser = null;

  window.onload = function() {
    const savedUser = localStorage.getItem('tdt_user');
    if (savedUser) {
      currentUser = JSON.parse(savedUser);
      routeUser(currentUser);
    }
  };

  function routeUser(userObj) {
    if (userObj.firstLogin) {
      document.getElementById('login-section').style.display = 'none';
      document.getElementById('force-pwd-section').style.display = 'flex';
      return;
    }
    // අදාල කෙනාව එයාගේ HTML එකට යවනවා
    if (userObj.role === 'Admin') window.location.href = 'admin.html';
    else if (userObj.role === 'Operator') window.location.href = 'operator.html';
    else window.location.href = 'user.html';
  }

  function logout() { localStorage.removeItem('tdt_user'); location.reload(); }

  async function doLogin() {
    const u = document.getElementById('uname').value;
    const p = document.getElementById('pwd').value;
    const btn = document.getElementById('loginBtn');
    if(!u || !p) return;
    btn.innerText = "Checking..."; btn.disabled = true;
    try {
      const res = await fetch(API_URL + `?action=checkLogin&username=${u}&password=${p}`);
      const json = await res.json();
      if (json.success && json.data.valid) {
        currentUser = json.data;
        localStorage.setItem('tdt_user', JSON.stringify(currentUser));
        routeUser(currentUser);
      } else {
        document.getElementById('loginError').style.display = "block";
        btn.innerText = "Login"; btn.disabled = false;
      }
    } catch (e) { alert("Network Error"); btn.innerText = "Login"; btn.disabled = false; }
  }

  async function saveNewPassword() {
    const p1 = document.getElementById('newPwd1').value; const p2 = document.getElementById('newPwd2').value;
    const err = document.getElementById('pwdUpdateError'); const btn = document.getElementById('updatePwdBtn');
    err.style.display = 'none';
    if(!p1 || !p2) { err.innerText = "Cannot be empty!"; err.style.display = 'block'; return; }
    if(p1 !== p2) { err.innerText = "Passwords do not match!"; err.style.display = 'block'; return; }
    
    btn.innerText = "Updating..."; btn.disabled = true;
    try {
      const res = await fetch(API_URL, { method: "POST", headers: {"Content-Type":"text/plain"}, body: JSON.stringify({action:"changePassword", data:{username: currentUser.username, newPass: p1}}) });
      const json = await res.json();
      if(json.success) {
        currentUser.firstLogin = false; localStorage.setItem('tdt_user', JSON.stringify(currentUser));
        routeUser(currentUser);
      } else { err.innerText = "Failed!"; err.style.display = 'block'; btn.innerText = "Update"; btn.disabled = false; }
    } catch (e) { err.innerText = "Error!"; err.style.display = 'block'; btn.innerText = "Update"; btn.disabled = false; }
  }
</script>
</body>
</html>
