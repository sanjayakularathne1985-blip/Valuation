<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vehicle Valuation Request</title>
  <style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f8f9fa; color: #333; padding: 20px; }
    .container { max-width: 850px; margin: auto; background: #fff; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
    h2 { color: #2c3e50; text-align: center; border-bottom: 3px solid #28a745; padding-bottom: 10px; }
    h3 { color: #28a745; margin-top: 25px; font-size: 18px; border-left: 5px solid #28a745; padding-left: 10px; }
    .section { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
    .full-width { grid-column: span 2; }
    label { font-weight: bold; display: block; margin-bottom: 5px; font-size: 14px; }
    input, select, textarea { width: 100%; padding: 10px; border: 1px solid #ced4da; border-radius: 5px; box-sizing: border-box; font-size: 14px; }
    .photo-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; background: #f1f3f5; padding: 15px; border-radius: 8px; }
    .photo-box { background-color: white; padding: 10px; border: 1px dashed #adb5bd; border-radius: 5px; text-align: center; position: relative; height: 90px; display: flex; flex-direction: column; justify-content: center; align-items: center; background-repeat: no-repeat; background-position: center; background-size: cover; }
    .photo-box label { font-size: 11px; margin-bottom: 3px; background: rgba(255,255,255,0.85); padding: 2px 5px; border-radius: 4px; z-index: 2; pointer-events: none; font-weight: bold; }
    .photo-box input[type="file"] { font-size: 11px; padding: 5px; z-index: 2; width: 90%; background: rgba(255,255,255,0.8); border-radius: 4px; margin-top: 5px; }
    .clear-btn { position: absolute; top: 5px; right: 5px; background: rgba(220, 53, 69, 0.9); color: white; width: 22px; height: 22px; border-radius: 50%; font-weight: bold; font-size: 14px; cursor: pointer; display: none; z-index: 10; line-height: 20px; text-align: center; border: 1px solid white; transition: 0.2s; }
    button.submit-btn { width: 100%; padding: 15px; background-color: #28a745; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 18px; font-weight: bold; margin-top: 25px; transition: 0.3s; }
    #status { margin-top: 20px; text-align: center; font-weight: bold; padding: 10px; border-radius: 5px; font-size: 16px; }
    .loader { display: none; margin: 10px auto; border: 4px solid #f3f3f3; border-top: 4px solid #28a745; border-radius: 50%; width: 30px; height: 30px; animation: spin 2s linear infinite; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div class="container">
  <h2>Vehicle Valuation Request Form</h2>
  
  <form id="vForm">
    <h3>1. Vehicle Identification</h3>
    <div class="section">
      <div class="full-width"><label>Vehicle Number</label><input type="text" name="vehicleNo" id="vehicleNo" required></div>
      <div>
        <label>Vehicle Type</label>
        <select id="vType" name="vType" onchange="updateMake();" required><option value="">Loading...</option></select>
      </div>
      <div>
        <label>Make</label>
        <select id="make" name="make" onchange="updateModel();" required disabled><option value="">-- Select Make --</option></select>
      </div>
      <div>
        <label>Model</label>
        <select id="model" name="model" required disabled><option value="">-- Select Model --</option></select>
      </div>
      <div><label>Year of Manufacture (YOM)</label><input type="number" name="yom" required></div>
    </div>

    <h3>2. Technical & Other Details</h3>
    <div class="section">
      <div><label>Chassis Number</label><input type="text" name="chassisNo" required></div>
      <div><label>Engine Number</label><input type="text" name="engineNo" required></div>
      <div><label>Color</label><input type="text" name="color" required></div>
      <div><label>Engine CC</label><input type="number" name="engCc" required></div>
      <div>
        <label>Fuel Type</label>
        <select name="fuelType"><option>Petrol</option><option>Diesel</option><option>Hybrid</option><option>Electric</option></select>
      </div>
      <div><label>Req. Valuation Amount (LKR)</label><input type="number" name="reqAmount" required></div>
      <div class="full-width"><label>Remarks</label><textarea name="remarks" rows="2"></textarea></div>
    </div>

    <h3>3. Inspection Photos (Mandatory)</h3>
    <div class="photo-grid">
      <div class="photo-box">
        <span class="clear-btn" onclick="clearImage(this)">×</span>
        <label>Front View *</label>
        <input type="file" name="img_front" accept="image/*" onchange="previewImage(this)" required>
      </div>
      <div class="photo-box">
        <span class="clear-btn" onclick="clearImage(this)">×</span>
        <label>Back View *</label>
        <input type="file" name="img_back" accept="image/*" onchange="previewImage(this)" required>
      </div>
      <div class="photo-box">
        <span class="clear-btn" onclick="clearImage(this)">×</span>
        <label>CR Copy *</label>
        <input type="file" name="img_cr" accept="image/*" onchange="previewImage(this)" required>
      </div>
      <div class="photo-box">
        <span class="clear-btn" onclick="clearImage(this)">×</span>
        <label>Chassis Plate *</label>
        <input type="file" name="img_chassis" accept="image/*" onchange="previewImage(this)" required>
      </div>
      <div class="photo-box">
        <span class="clear-btn" onclick="clearImage(this)">×</span>
        <label>Engine Bay *</label>
        <input type="file" name="img_engine" accept="image/*" onchange="previewImage(this)" required>
      </div>
      <div class="photo-box">
        <span class="clear-btn" onclick="clearImage(this)">×</span>
        <label>Meter (Mileage) *</label>
        <input type="file" name="img_meter" accept="image/*" onchange="previewImage(this)" required>
      </div>
      <div class="photo-box">
        <span class="clear-btn" onclick="clearImage(this)">×</span>
        <label>Inspection Sheet *</label>
        <input type="file" name="img_sheet" accept="image/*" onchange="previewImage(this)" required>
      </div>
      <div class="photo-box">
        <span class="clear-btn" onclick="clearImage(this)">×</span>
        <label>Inside/Interior (Opt)</label>
        <input type="file" name="img_inside" accept="image/*" onchange="previewImage(this)">
      </div>
      <div class="photo-box">
        <span class="clear-btn" onclick="clearImage(this)">×</span>
        <label>Tyre Condition (Opt)</label>
        <input type="file" name="img_tyre" accept="image/*" onchange="previewImage(this)">
      </div>
      <div class="photo-box">
        <span class="clear-btn" onclick="clearImage(this)">×</span>
        <label>Customer w/ Vehicle *</label>
        <input type="file" name="img_customer" accept="image/*" onchange="previewImage(this)" required>
      </div>
      <div class="photo-box">
        <span class="clear-btn" onclick="clearImage(this)">×</span>
        <label>Officer w/ Vehicle *</label>
        <input type="file" name="img_officer" accept="image/*" onchange="previewImage(this)" required>
      </div>
    </div>

    <button type="submit" id="submitBtn" class="submit-btn">Submit Request</button>
  </form>
  
  <div class="loader" id="loader"></div>
  <div id="status"></div>
</div>

<script>
  // ==========================================
  // මෙතනට ඔයාගේ අලුත් API URL එක දාන්න!
  // ==========================================
  const API_URL = "https://script.google.com/macros/s/AKfycbwJFRegsb-nPF7hps3aCIrAvs2Wu7v35mfWgcPY5N2P3K2c4bx9pH5VJAF9HpcBPOBS/exec"; 

  let allData = [];

  window.onload = function() {
    fetch(API_URL + "?action=getVehicleData")
      .then(res => res.json())
      .then(response => {
        if(response.success) {
          allData = response.data;
          const typeSelect = document.getElementById('vType');
          typeSelect.innerHTML = '<option value="">-- Select Type --</option>';
          const types = [...new Set(allData.map(item => item[0]))]; 
          types.forEach(t => typeSelect.add(new Option(t, t)));
        } else {
          alert("Error loading data!");
        }
      });
  };

  function updateMake() { 
    const type = document.getElementById('vType').value;
    const makeSelect = document.getElementById('make');
    const modelSelect = document.getElementById('model');
    makeSelect.innerHTML = '<option value="">-- Select Make --</option>';
    modelSelect.innerHTML = '<option value="">-- Select Model --</option>';
    modelSelect.disabled = true;
    if(type) {
      const makes = [...new Set(allData.filter(d => d[0] === type).map(d => d[1]))]; 
      makes.forEach(m => makeSelect.add(new Option(m, m)));
      makeSelect.disabled = false;
    } else { makeSelect.disabled = true; }
  }

  function updateModel() { 
    const type = document.getElementById('vType').value;
    const make = document.getElementById('make').value;
    const modelSelect = document.getElementById('model');
    modelSelect.innerHTML = '<option value="">-- Select Model --</option>';
    if(make) {
      const models = [...new Set(allData.filter(d => d[0] === type && d[1] === make).map(d => d[2]))]; 
      models.forEach(mod => modelSelect.add(new Option(mod, mod)));
      modelSelect.disabled = false;
    } else { modelSelect.disabled = true; }
  }

  function previewImage(input) {
    const clearBtn = input.parentElement.querySelector('.clear-btn');
    if (input.files && input.files[0]) {
      var reader = new FileReader();
      reader.onload = function(e) {
        input.parentElement.style.backgroundImage = 'url(' + e.target.result + ')';
        if(clearBtn) clearBtn.style.display = 'block';
      }
      reader.readAsDataURL(input.files[0]);
    } else {
      input.parentElement.style.backgroundImage = 'none';
      if(clearBtn) clearBtn.style.display = 'none';
    }
  }

  function clearImage(btn) {
    const box = btn.parentElement;
    const input = box.querySelector('input[type="file"]');
    input.value = ""; 
    box.style.backgroundImage = 'none'; 
    btn.style.display = 'none'; 
  }

  function compressImage(file, maxSize = 800, quality = 0.6) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.readAsDataURL(file);
      reader.onload = event => {
        const img = new Image();
        img.src = event.target.result;
        img.onload = () => {
          const canvas = document.createElement('canvas');
          let width = img.width; let height = img.height;
          if (width > height) { if (width > maxSize) { height = Math.round(height *= maxSize / width); width = maxSize; } } 
          else { if (height > maxSize) { width = Math.round(width *= maxSize / height); height = maxSize; } }
          canvas.width = width; canvas.height = height;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, width, height);
          const dataUrl = canvas.toDataURL('image/jpeg', quality);
          resolve({ data: dataUrl.split(',')[1], type: 'image/jpeg', name: file.name });
        };
      };
      reader.onerror = error => reject(error);
    });
  }

  async function uploadImageAsync(imageObj) {
    const response = await fetch(API_URL, {
      method: "POST",
      headers: { "Content-Type": "text/plain" }, 
      body: JSON.stringify({ action: "uploadImage", data: imageObj })
    });
    const resData = await response.json();
    if(resData.success) {
      return { success: true, key: resData.result.key, url: resData.result.url };
    } else {
      return { success: false, error: resData.error };
    }
  }

  document.getElementById('vForm').onsubmit = async (e) => {
    e.preventDefault();
    const btn = document.getElementById('submitBtn');
    const status = document.getElementById('status');
    const loader = document.getElementById('loader');

    btn.disabled = true;
    loader.style.display = "block";
    
    const formData = {};
    const textInputs = e.target.querySelectorAll('input:not([type="file"]), select, textarea');
    const fileInputs = e.target.querySelectorAll('input[type="file"]');
    
    for (const input of textInputs) { formData[input.name] = input.value; }
    formData.requesterEmail = "unknown-user@tdt.lk";

    let filesToUpload = [];
    for (const input of fileInputs) {
      if (input.files.length > 0) {
        filesToUpload.push({ inputName: input.name, file: input.files[0], label: input.previousElementSibling.innerText.replace(' *', '') });
      } else { formData[input.name] = "No Image"; }
    }

    for (let i = 0; i < filesToUpload.length; i++) {
      let f = filesToUpload[i];
      status.style.color = "#007bff";
      status.innerText = `⏳ Uploading Image ${i + 1} of ${filesToUpload.length}... (${f.label})`;
      
      try {
        let compressed = await compressImage(f.file, 800, 0.6);
        let imageObj = { base64: compressed.data, type: compressed.type, name: compressed.name, key: f.inputName, vehicleNo: formData.vehicleNo };
        let result = await uploadImageAsync(imageObj); 
        
        if (result && result.success) {
          formData[result.key] = result.url;
        } else {
          alert("❌ Error on " + f.label + ": " + result.error);
          formData[f.inputName] = "No Image";
        }
      } catch (err) {
        formData[f.inputName] = "No Image";
      }
    }

    status.innerText = "✅ Images uploaded! Saving request...";

    try {
      const saveResponse = await fetch(API_URL, {
        method: "POST",
        headers: { "Content-Type": "text/plain" },
        body: JSON.stringify({ action: "submitForm", data: formData })
      });
      const saveResult = await saveResponse.json();
      
      loader.style.display = "none";
      if(saveResult.success) {
        status.innerText = saveResult.result;
        status.style.color = "green";
        e.target.reset();
        document.querySelectorAll('.photo-box').forEach(box => { box.style.backgroundImage = 'none'; });
        document.querySelectorAll('.clear-btn').forEach(btn => { btn.style.display = 'none'; });
      } else {
        status.innerText = "Error: " + saveResult.error;
        status.style.color = "red";
      }
    } catch(err) {
      loader.style.display = "none";
      status.innerText = "Connection Error!";
      status.style.color = "red";
    }
    btn.disabled = false;
  };
</script>

</body>
</html>
